name: CI/CD Pipeline

on:
  push:
    branches:
      -main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: 'npm'
      
      - name: Install dependencies
         run: npm ci
      
      - name: Run Tests
         run: npm run test -- --watch=false
      
deploy:
  runs-on: ubuntu-latest
  needs: test
  steps:
    - name: Checkout Code
      uses: actions/checkout@v4
       run: npm run build